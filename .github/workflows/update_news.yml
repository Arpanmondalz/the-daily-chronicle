# Workflow: Update Fantasy News
# Status: DISABLED (no triggers)
#
# To re-enable:
# 1) Uncomment the `on:` section below to restore schedule & manual run:
#
# on:
#   schedule:
#     # Run every 4 hours (at minute 0 of hour 0, 4, 8, 12, 16, 20)
#     - cron: '0 */4 * * *'
#   workflow_dispatch: # Allows running it manually
#
# 2) Commit your changes.
# 
# Alternatively, you can re-enable only manual runs by uncommenting just `workflow_dispatch`.

# Note: With no `on:` section, this workflow will not trigger at all.

jobs:
  update-news:
    if: ${{ false }} # Safety: Even if someone re-adds events incorrectly, this keeps jobs off. Remove to run.
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout content
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run the Chronicler
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        python update_news.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Grand Chronicler Bot"
        git config --global user.email "actions@github.com"
        git add news.json
        # Only commit if news.json actually changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update scrolls: $(date)" && git push)
